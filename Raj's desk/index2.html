<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Envirosense Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      /* Light Theme Variables */
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --border-color: #e2e8f0;
      --text-primary: #010308;
      --text-secondary: #1f2a3a;
      --ring-bg: #e2e8f0;
    }

    body.dark-mode {
      /* Dark Theme Variables */
      --bg-color: #0d0d0d;
      --card-bg: #141414;
      --border-color: #262626;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --ring-bg: #262626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 1.5rem 1rem;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Responsive Width Container */
    .dashboard-container {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    /* Header & Theme Toggle */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      height: 28px;
      width: auto;
      object-fit: contain;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 500;
    }

    #themeToggleBtn {
      background-color: var(--card-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    #themeToggleBtn:hover {
      border-color: #38bdf8;
    }

    /* Grid Layout & Media Queries */
    .gauge-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    @media (min-width: 540px) {
      .gauge-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
      .gauge-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* Cards */
    .card, .chart-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .card h3, .chart-card h3 {
      align-self: flex-start;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    /* SVG Circular Gauges */
    .gauge-container {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    circle { fill: none; stroke-width: 12; stroke-linecap: round; }
    .bg-ring { stroke: var(--ring-bg); }
    .val-ring {
      stroke: #80ed99;
      stroke-dasharray: 377;
      stroke-dashoffset: 377;
      transition: stroke-dashoffset 0.8s ease;
    }

    .gauge-value { position: absolute; text-align: center; }
    .gauge-value .number { font-size: 1.5rem; font-weight: bold; }
    .gauge-value .unit { font-size: 0.8rem; color: var(--text-secondary); }

    .gauge-limits {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    /* Footer */
    footer {
      margin-top: 2rem;
      padding: 1.25rem 0;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    footer strong { color: var(--text-primary); }
    footer a { color: #38bdf8; text-decoration: none; }
    /* Invert logo color in Light Mode */
    body:not(.dark-mode) .header-logo {
    filter: invert(1);
    }

    @media (min-width: 640px) {
      footer { flex-direction: row; justify-content: space-between; }
    }
  </style>
</head>
<body class="dark-mode">

  <div class="dashboard-container">

    <!-- Header Section -->
    <header>
      <div class="header-left">
        <img src="../images/tree.png" alt="Logo" class="header-logo">
        <h1>Envirosense</h1>
      </div>
      <button id="themeToggleBtn" onclick="toggleTheme()" aria-label="Toggle Theme">
        🌙 Dark
      </button>
    </header>

    <!-- Top Gauge Row -->
    <div class="gauge-grid">
      <!-- Gas -->
      <div class="card">
        <h3>Gas</h3>
        <div class="gauge-container">
          <svg viewBox="0 0 140 140">
            <circle class="bg-ring" cx="70" cy="70" r="60"></circle>
            <circle id="ring-gas" class="val-ring" cx="70" cy="70" r="60"></circle>
          </svg>
          <div class="gauge-value">
            <div id="val-gas" class="number">--</div>
            <div class="unit">KOhm</div>
          </div>
        </div>
        <div class="gauge-limits"><span>0</span><span>120</span></div>
      </div>

      <!-- Humidity -->
      <div class="card">
        <h3>Humidity</h3>
        <div class="gauge-container">
          <svg viewBox="0 0 140 140">
            <circle class="bg-ring" cx="70" cy="70" r="60"></circle>
            <circle id="ring-humidity" class="val-ring" cx="70" cy="70" r="60"></circle>
          </svg>
          <div class="gauge-value">
            <div id="val-humidity" class="number">--</div>
            <div class="unit">%</div>
          </div>
        </div>
        <div class="gauge-limits"><span>0</span><span>100</span></div>
      </div>

      <!-- Pressure -->
      <div class="card">
        <h3>Pressure</h3>
        <div class="gauge-container">
          <svg viewBox="0 0 140 140">
            <circle class="bg-ring" cx="70" cy="70" r="60"></circle>
            <circle id="ring-pressure" class="val-ring" cx="70" cy="70" r="60"></circle>
          </svg>
          <div class="gauge-value">
            <div id="val-pressure" class="number">--</div>
            <div class="unit">hPa</div>
          </div>
        </div>
        <div class="gauge-limits"><span>750</span><span>1500</span></div>
      </div>

      <!-- Temperature -->
      <div class="card">
        <h3>Temperature</h3>
        <div class="gauge-container">
          <svg viewBox="0 0 140 140">
            <circle class="bg-ring" cx="70" cy="70" r="60"></circle>
            <circle id="ring-temperature" class="val-ring" cx="70" cy="70" r="60"></circle>
          </svg>
          <div class="gauge-value">
            <div id="val-temperature" class="number">--</div>
            <div class="unit">°C</div>
          </div>
        </div>
        <div class="gauge-limits"><span>-20</span><span>100</span></div>
      </div>
    </div>

    <!-- Bottom Line Chart -->
    <div class="chart-card">
      <h3>Chart</h3>
      <canvas id="multiChart" height="100"></canvas>
    </div>

    <!-- Credit Footer Section -->
    <footer>
      <p>
        Designed and made by <strong>Rajnarayan Hazra</strong>, <strong>Riya Pailwan</strong>, and <strong>Harsh Patange</strong>.
      </p>
      <a href="https://github.com/your-username/your-repo" target="_blank" rel="noopener noreferrer">
        For more info ➔
      </a>
    </footer>

  </div>

  <script>
    const SENSOR_RANGES = {
      gas: { min: 0, max: 120 },
      humidity: { min: 0, max: 100 },
      pressure: { min: 750, max: 1500 },
      temperature: { min: -20, max: 100 }
    };

    let chart;

    function initChart() {
      const ctx = document.getElementById('multiChart').getContext('2d');
      const isDark = document.body.classList.contains('dark-mode');
      const gridColor = isDark ? '#222222' : '#f1f5f9';
      const tickColor = isDark ? '#aaaaaa' : '#64748b';

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: [],
          datasets: [
            { label: 'Pressure', borderColor: '#80ed99', borderWidth: 1.5, data: [], pointRadius: 0 },
            { label: 'Humidity', borderColor: '#ffb703', borderWidth: 1.5, data: [], pointRadius: 0 },
            { label: 'Gas', borderColor: '#e63946', borderWidth: 1.5, data: [], pointRadius: 0 },
            { label: 'Temperature', borderColor: '#38bdf8', borderWidth: 1.5, data: [], pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: tickColor, boxWidth: 12 } } },
          scales: {
            x: { grid: { color: gridColor }, ticks: { color: tickColor } },
            y: { grid: { color: gridColor }, ticks: { color: tickColor } }
          }
        }
      });
    }

    function setGaugeValue(feed, val) {
      document.getElementById(`val-${feed}`).innerText = val.toFixed(2);

      const range = SENSOR_RANGES[feed];
      const percentage = Math.min(Math.max((val - range.min) / (range.max - range.min), 0), 1);
      
      const circumference = 377; // 2 * PI * 60
      const offset = circumference - (percentage * circumference);
      document.getElementById(`ring-${feed}`).style.strokeDashoffset = offset;
    }

    async function loadData() {
      try {
        const res = await fetch('/api/data');
        const payload = await res.json();

        // Update Gauges
        ['gas', 'humidity', 'pressure', 'temperature'].forEach(feed => {
          if (payload[feed] && payload[feed].length > 0) {
            const latest = payload[feed][payload[feed].length - 1].value;
            setGaugeValue(feed, latest);
          }
        });

        // Update Chart
        if (payload.temperature && payload.temperature.length > 0) {
          chart.data.labels = payload.temperature.map(d => d.time);
          chart.data.datasets[0].data = payload.pressure ? payload.pressure.map(d => d.value) : [];
          chart.data.datasets[1].data = payload.humidity ? payload.humidity.map(d => d.value) : [];
          chart.data.datasets[2].data = payload.gas ? payload.gas.map(d => d.value) : [];
          chart.data.datasets[3].data = payload.temperature.map(d => d.value);
          chart.update();
        }

      } catch (err) {
        console.error('Error fetching dashboard data:', err);
      }
    }

    // Theme Toggle Function
    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('themeToggleBtn');
      const isDark = body.classList.toggle('dark-mode');

      btn.innerHTML = isDark ? '🌙 Dark' : '☀️ Light';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');

      if (chart) {
        const gridColor = isDark ? '#222222' : '#f1f5f9';
        const tickColor = isDark ? '#aaaaaa' : '#64748b';
        chart.options.scales.x.grid.color = gridColor;
        chart.options.scales.y.grid.color = gridColor;
        chart.options.scales.x.ticks.color = tickColor;
        chart.options.scales.y.ticks.color = tickColor;
        chart.options.plugins.legend.labels.color = tickColor;
        chart.update();
      }
    }

    // Initialize Saved Theme
    (function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') {
        document.body.classList.remove('dark-mode');
        document.getElementById('themeToggleBtn').innerHTML = '☀️ Light';
      }
    })();

    initChart();
    loadData();
    setInterval(loadData, 15000); // Poll every 15 seconds
  </script>
</body>
</html>
